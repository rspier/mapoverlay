<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Layer Comparator</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Local Stylesheet -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <!-- Two Maps -->
    <div id="map-base" class="map-container"></div>
    <div id="map-overlay" class="map-container interaction-disabled"></div>

    <!-- Floating UI Panel -->
    <div id="ui-panel" class="control-panel absolute top-4 left-4 w-96 bg-white/95 backdrop-blur-sm rounded-xl shadow-xl border border-gray-200 p-4 max-h-[90vh] overflow-y-auto">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-4 border-b border-gray-100 pb-3">
            <h1 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 7m0 13V7m0 0L9 4" />
                </svg>
                Map Comparator
            </h1>
            
            <div class="flex items-center gap-2">
                <!-- Share Button -->
                <button id="btn-share" class="text-xs flex items-center gap-1 text-blue-600 hover:text-blue-800 font-medium bg-blue-50 hover:bg-blue-100 px-2 py-1 rounded transition-colors" title="Copy Link">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                    </svg>
                </button>
                
                <!-- Swap Button -->
                <button id="btn-swap" class="text-xs flex items-center gap-1 text-gray-600 hover:text-gray-800 font-medium bg-gray-50 hover:bg-gray-100 px-2 py-1 rounded transition-colors" title="Swap Layers">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
                    </svg>
                </button>

                <!-- Collapse Button -->
                <button id="btn-collapse" class="text-gray-400 hover:text-gray-700 p-1 rounded hover:bg-gray-100 transition-colors">
                    <svg id="icon-collapse" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Global Controls -->
        <div class="mb-4 bg-blue-50 p-3 rounded-lg border border-blue-100">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs font-bold text-blue-800 uppercase">Interaction Mode</span>
                <span class="text-[10px] text-blue-600">Which map moves?</span>
            </div>
            <div class="flex bg-white rounded-lg p-1 shadow-sm border border-blue-100">
                <button id="ctrl-base" class="flex-1 py-1.5 px-3 rounded-md text-xs font-medium transition-colors">Move Base</button>
                <button id="ctrl-overlay" class="flex-1 py-1.5 px-3 rounded-md text-xs font-medium transition-colors">Move Overlay</button>
            </div>
            
            <div class="mt-3 flex items-center gap-2">
                <input type="checkbox" id="sync-zoom" checked class="rounded text-blue-500 focus:ring-blue-500 w-4 h-4">
                <label for="sync-zoom" class="text-xs text-gray-700 font-medium select-none cursor-pointer">Lock/Sync Zoom Levels</label>
            </div>
        </div>

        <!-- Section: Overlay Map (Top) -->
        <div class="mb-5 relative group">
            <div class="absolute -left-4 top-4 bottom-4 w-1 bg-blue-500 rounded-r"></div>
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2 pl-2">Top Layer (Overlay)</h2>
            
            <!-- Search Overlay -->
            <div class="flex gap-2 mb-2">
                <div class="relative flex-1">
                    <input type="text" id="search-overlay" placeholder="Loc: New York" 
                        class="w-full px-3 py-1.5 pr-8 border border-gray-300 rounded text-sm focus:ring-1 focus:ring-blue-500 focus:outline-none">
                    <button id="btn-search-overlay" class="absolute right-1 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-500 p-1">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </button>
                </div>
            </div>

            <!-- Style, Opacity, Rotation, Tint -->
            <div class="space-y-3">
                <select id="select-overlay" class="w-full p-2 bg-gray-50 border border-gray-300 text-gray-900 text-xs rounded focus:ring-blue-500 block"></select>
                
                <!-- Tint Control -->
                <div class="flex items-center gap-2">
                     <label class="text-[10px] font-bold text-gray-500 uppercase whitespace-nowrap min-w-[30px]">Tint:</label>
                     <select id="filter-overlay" class="w-full p-1.5 bg-gray-50 border border-gray-300 text-gray-900 text-[10px] rounded focus:ring-blue-500 block">
                         <option value="filter-normal">Normal (Default)</option>
                         <option value="filter-invert">White (Invert)</option>
                         <option value="filter-red">Red</option>
                         <option value="filter-blue">Blue</option>
                         <option value="filter-green">Green</option>
                         <option value="filter-high-contrast">High Contrast</option>
                     </select>
                </div>

                <!-- Opacity -->
                <div class="bg-gray-50 p-2 rounded border border-gray-200">
                    <div class="flex justify-between mb-1">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Opacity</label>
                        <span id="opacity-val" class="text-[10px] font-mono text-blue-600">50%</span>
                    </div>
                    <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.5">
                </div>

                <!-- Rotation -->
                <div class="bg-gray-50 p-2 rounded border border-gray-200">
                    <div class="flex justify-between mb-1">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Rotation</label>
                        <span id="rot-val" class="text-[10px] font-mono text-blue-600">0°</span>
                    </div>
                    <input type="range" id="rot-slider" min="-180" max="180" step="1" value="0">
                    <div class="flex justify-between text-[8px] text-gray-400 mt-1">
                        <span>-180°</span>
                        <span>0°</span>
                        <span>180°</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section: Base Map (Bottom) -->
        <div class="relative group">
            <div class="absolute -left-4 top-4 bottom-4 w-1 bg-gray-400 rounded-r"></div>
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2 pl-2">Bottom Layer (Base)</h2>
            
            <!-- Search Base -->
            <div class="flex gap-2 mb-2">
                <div class="relative flex-1">
                    <input type="text" id="search-base" placeholder="Loc: Paris" 
                        class="w-full px-3 py-1.5 pr-8 border border-gray-300 rounded text-sm focus:ring-1 focus:ring-gray-500 focus:outline-none">
                    <button id="btn-search-base" class="absolute right-1 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 p-1">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </button>
                </div>
            </div>

            <select id="select-base" class="w-full p-2 bg-gray-50 border border-gray-300 text-gray-900 text-xs rounded focus:ring-gray-500 block"></select>
        </div>

        <div class="mt-4 pt-3 border-t border-gray-100 text-[10px] text-gray-400 text-center">
            Note: Drag maps independently to align features. <br/>
            <span class="text-blue-400 font-medium">Tip: Hold Ctrl to drag the non-selected map.</span>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Main Application Entry (ES Module) -->
    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
